spring.application.name=RobustAiIntegration

# --- AI provider configuration -------------------------------------------------
# The API key is intentionally defaulted to an empty string instead of being left
# unresolved. This lets AiClientService's own @PostConstruct fail-fast check -
# rather than Spring's generic "could not resolve placeholder" error - be the
# thing that reports a missing key, with a clear and specific message.
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
openai.api.model=${OPENAI_API_MODEL:gpt-4o-mini}

# --- Reliability layer tuning ---------------------------------------------------
# All values below have sensible defaults but can be overridden via environment
# variables, which also makes them easy to override from automated tests.
ai.client.connect-timeout-ms=${AI_CONNECT_TIMEOUT_MS:2000}
ai.client.read-timeout-ms=${AI_READ_TIMEOUT_MS:8000}
ai.client.max-retries=${AI_MAX_RETRIES:3}
ai.client.initial-backoff-ms=${AI_INITIAL_BACKOFF_MS:1000}
